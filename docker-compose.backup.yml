name: infinity-node
services:
    deluge:
        container_name: deluge
        network_mode: container:vpn
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Europe/London
            - DELUGE_LOGLEVEL=error
        volumes:
            - /config/deluge:/config
            - /media/downloads:/incomplete
            - /mnt/complete:/complete
        restart: unless-stopped
        depends_on:
            nordlynx:
                condition: service_started
                restart: true
        image: ghcr.io/linuxserver/deluge:latest
    nordlynx:
        container_name: vpn
        cap_add:
            - NET_ADMIN
            - NET_RAW
        dns:
            - 1.1.1.1
        ports:
            - 8112:8112
            - 6881:6881
            - 6881:6881/udp
            - 6789:6789
        environment:
            - PRIVATE_KEY=uCh/s6/i1zzdBfi+VEzYolZKX4JLb+/lXeNTc0poel0=
            - NET_LOCAL=192.168.86.0/24
        restart: unless-stopped
        image: ghcr.io/bubuntux/nordlynx
    embyserver:
        container_name: emby
        deploy:
            resources:
                reservations:
                    devices:
                        - driver: nvidia
                          count: all
                          capabilities:
                              - gpu
        volumes:
            - /config/emby:/config
            - /mnt/video/Video:/mnt/movies
        network_mode: host
        restart: unless-stopped
        image: emby/embyserver:latest
    flaresolverr:
        container_name: flaresolverr
        ports:
            - 8191:8191
        environment:
            - LOG_LEVEL=info
        restart: unless-stopped
        image: ghcr.io/flaresolverr/flaresolverr:latest
    prowlarr:
        container_name: prowlarr
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Etc/UTC
        ports:
            - 9696:9696
        volumes:
            - /media/evan/prowlarr:/config
        restart: unless-stopped
        image: lscr.io/linuxserver/prowlarr:latest
    sonarr:
        container_name: sonarr
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Etc/UTC
        ports:
            - 8989:8989
        deploy:
            resources:
                limits:
                    memory: 32g
        volumes:
            - /config/sonarr:/config
            - /mnt/video/Video/TV:/tv
            - /mnt/complete:/downloads
        restart: unless-stopped
        depends_on:
            deluge:
                condition: service_started
                restart: true
        image: lscr.io/linuxserver/sonarr:latest
    radarr:
        container_name: radarr
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Europe/London
        deploy:
            resources:
                limits:
                    memory: 32g
        ports:
            - 7878:7878
        volumes:
            - /config/radarr:/config
            - /mnt/video/Video/Movies:/movies
            - /mnt/complete:/downloads
        restart: unless-stopped
        depends_on:
            deluge:
                condition: service_started
                restart: true
        image: lscr.io/linuxserver/radarr:latest
    readarr:
        image: lscr.io/linuxserver/readarr:develop
        container_name: readarr
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Etc/UTC
        volumes:
            - /config/readarr:/config
            - /mnt/video/Books:/books
            - /mnt/complete:/downloads
        ports:
            - 8787:8787
        restart: unless-stopped
    nzbget:
        image: lscr.io/linuxserver/nzbget:latest
        container_name: nzbget
        environment:
            - PUID=1000
            - PGID=1000
            - TZ=Etc/UTC
            - NZBGET_USER=nzbget #optional
            - NZBGET_PASS=tegbzn6789 #optional
        volumes:
            - /config/nzbget:/config
            - /media/downloads:/incomplete
            - /mnt/complete:/downloads
        network_mode: container:vpn
        restart: unless-stopped
    minecraft-server:
        ports:
            - 25565:25565
        deploy:
            resources:
                limits:
                    memory: 16g
        environment:
            - EULA=TRUE
            - OPS=surian
            - WHITELIST=surian
            - EXISTING_WHITELIST_FILE=SYNCHRONIZE
            - EXISTING_OPS_FILE=SYNCHRONIZE
            - DIFFICULTY=easy
            - SEED=6259851991576567244
        container_name: mc
        volumes:
            - /mc-data:/data
        image: itzg/minecraft-server
    noip-duc:
        env_file:
            - noip-duc.env
        restart: unless-stopped
        container_name: noip-duc
        image: ghcr.io/noipcom/noip-duc:latest

